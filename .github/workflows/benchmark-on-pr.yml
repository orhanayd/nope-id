name: Update README benchmarks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: bench-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    # Skip fork PRs (cannot push back to the fork with the default token).
    # Bot-authored commits do not retrigger workflows under GITHUB_TOKEN,
    # so no extra [skip ci] guard is needed.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      # Gate the benchmark on a full green test run. If anything below fails,
      # the workflow stops before the benchmark step, so the README is never
      # refreshed from a broken build.

      - name: Run main test suites (core, features, utils, non-secure, idtypes, encoding)
        run: npm test

      - name: Run randomness statistical tests
        run: npm run test:randomness

      - name: Type-check public API (tsc --noEmit on tests/types.test.ts)
        run: npm run test:types

      - name: Smoke-test browser bundle (Web Crypto + TextDecoder path)
        run: npm run test:browser

      # All tests passed: produce fresh benchmark numbers and refresh README.

      - name: Run benchmark (JSON)
        run: node benchmarks/benchmark.js --json > bench.json

      - name: Upload bench.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.json

      - name: Refresh README perf tables
        run: node scripts/update-readme.js bench.json

      - name: Commit refreshed README
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(bench): refresh README perf numbers [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
