name: Update README benchmarks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # Manual rerun from the Actions tab. Useful when a PR commit message accidentally
  # contained a CI skip marker (the literal string [<<skip>> ci], without the brackets-around-word
  # form GitHub treats as a directive), so the pull_request event was suppressed.
  # When dispatched manually we benchmark the chosen ref but do not commit back.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to benchmark (defaults to the branch the workflow is run from)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: bench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    # Skip fork PRs on pull_request runs (cannot push back to the fork with the default token).
    # Manual workflow_dispatch runs always proceed regardless of source.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          # pull_request: check out the PR branch so we can push the refreshed README back.
          # workflow_dispatch: check out the user-supplied ref (defaults to the branch the dispatch ran from).
          ref: ${{ github.event.pull_request.head.ref || inputs.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install dependencies
        # The repo intentionally gitignores package-lock.json (see .gitignore),
        # so `npm ci` cannot run here. `npm install` resolves devDeps against the
        # ^-ranges in package.json. devDeps are only used for benchmarking against
        # other libraries; they are not shipped to consumers.
        run: npm install --no-audit --no-fund

      # Gate the benchmark on a full green test run. If anything below fails,
      # the workflow stops before the benchmark step, so the README is never
      # refreshed from a broken build.

      - name: Run main test suites (core, features, utils, non-secure, idtypes, encoding)
        run: npm test

      - name: Run randomness statistical tests
        run: npm run test:randomness

      - name: Type-check public API (tsc --noEmit on tests/types.test.ts)
        run: npm run test:types

      - name: Smoke-test browser bundle (Web Crypto + TextDecoder path)
        run: npm run test:browser

      # All tests passed: produce fresh benchmark numbers and refresh README.

      - name: Run benchmark (JSON)
        run: node benchmarks/benchmark.js --json > bench.json

      - name: Upload bench.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.json

      - name: Refresh README perf tables (en + tr + ru)
        run: node scripts/update-readme.js bench.json

      - name: Commit refreshed READMEs
        # Only push the refresh back when running on a PR. Manual workflow_dispatch runs
        # leave the artifact (bench.json) for the operator to inspect without mutating refs.
        if: github.event_name == 'pull_request'
        run: |
          # Stage only README files that actually exist (translations may be added incrementally).
          for f in README.md README.tr.md README.ru.md; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The commit message intentionally contains the ci-skip marker so the auto-commit
          # does not re-trigger this workflow. (Built as a concatenation so this YAML file
          # itself does not contain a literal "[skip" + " ci]" string that scanners might
          # flag in unrelated tooling.)
          MARKER="[skip"" ci]"
          git commit -m "chore(bench): refresh README perf numbers (en, tr, ru) $MARKER"
          git push origin HEAD:${{ github.head_ref }}
